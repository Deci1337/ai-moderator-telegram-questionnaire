services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 5d5c5a25dc227cf1f996c9e51f2d5a06b
      POSTGRES_DB: telegram_bot_service
    volumes:
      - game_agent_pg_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d telegram_bot_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - .:/app
    ports:
      - "8003:8003"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  game_agent_pg_data:
